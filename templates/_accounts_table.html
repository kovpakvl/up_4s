<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>Сервис</th>
                <th>Тип</th>
                <th>Логин</th>
                <th>Последняя смена</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {% for account in accounts %}
            <tr>
                <td>
                    <strong>{{ account.service_name }}</strong>
                    <span>{{ account.site_url }}</span>
                </td>
                <td>
                    <span class="tag {% if account.is_financial %}tag-finance{% endif %}">
                        {{ account.service_type_name }}
                    </span>
                </td>
                <td>{{ account.login or account.email }}</td>
                <td>{{ account.password_changed_at or account.updated_at }}</td>
                <td class="right"><a class="ghost-button small" href="{{ url_for('view_account', account_id=account.id) }}">Открыть</a></td>
            </tr>
            {% else %}
            <tr>
                <td colspan="5" class="empty-cell">Аккаунты не найдены</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
