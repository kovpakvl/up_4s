{% extends "base.html" %}

{% block content %}
<header class="page-header narrow">
    <div>
        <p class="eyebrow">Аккаунт</p>
        <h1>{% if account %}Редактирование{% else %}Новый аккаунт{% endif %}</h1>
    </div>
</header>

<form method="post" class="form panel-form">
    <div class="form-grid">
        <label>
            <span>Сотрудник</span>
            <select name="employee_id" required>
                <option value="">Выберите сотрудника</option>
                {% for employee in employees %}
                {% set selected_id = account.employee_id if account else selected_employee_id %}
                <option value="{{ employee.id }}" {% if selected_id == employee.id %}selected{% endif %}>
                    {{ employee.full_name }}
                </option>
                {% endfor %}
            </select>
        </label>
        <label>
            <span>Отдел</span>
            <select name="department_id" required>
                {% for department in departments %}
                <option value="{{ department.id }}" {% if account and account.department_id == department.id %}selected{% endif %}>{{ department.name }}</option>
                {% endfor %}
            </select>
        </label>
        <label>
            <span>Тип сервиса</span>
            <select name="service_type_id" required>
                {% for type in service_types %}
                <option value="{{ type.id }}" {% if account and account.service_type_id == type.id %}selected{% endif %}>{{ type.name }}</option>
                {% endfor %}
            </select>
        </label>
        <label>
            <span>Название сервиса</span>
            <input name="service_name" value="{{ account.service_name if account else '' }}" required>
        </label>
        <label>
            <span>Сайт</span>
            <input name="site_url" value="{{ account.site_url if account else '' }}">
        </label>
        <label>
            <span>Логин</span>
            <input name="login" value="{{ account.login if account else '' }}">
        </label>
        <label>
            <span>Email</span>
            <input type="email" name="email" value="{{ account.email if account else '' }}">
        </label>
        <label>
            <span>Пароль</span>
            <div class="password-line">
                <input id="password-input" type="password" name="password" value="{{ account.password if account else '' }}" required>
                <button class="ghost-button small" type="button" data-toggle-password="#password-input">Показать</button>
            </div>
        </label>
        <label class="wide">
            <span>Комментарий</span>
            <textarea name="comment" rows="4">{{ account.comment if account else '' }}</textarea>
        </label>
        <label class="check-line">
            <input type="checkbox" name="is_favorite" {% if account and account.is_favorite %}checked{% endif %}>
            <span>Избранный аккаунт</span>
        </label>
    </div>
    <div class="form-actions">
        <a class="ghost-button" href="{{ url_for('dashboard') }}">Отмена</a>
        <button class="primary-button compact" type="submit">Сохранить</button>
    </div>
</form>
{% endblock %}
